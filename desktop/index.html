<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Slightly relaxed CSP for Vite development in Electron -->
    <meta http-equiv="Content-Security-Policy"
        content="script-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:* https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src http://localhost:* blob: data:; connect-src 'self' ws://localhost:* http://localhost:* http://127.0.0.1:7547;" />
    <title>Excelor</title>
    <!-- Prevent theme flash on load -->
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('excelor-theme') || 'dark';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) { }
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
